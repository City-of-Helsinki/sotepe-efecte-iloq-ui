version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: efecte-iloq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: efecte-iloq-ui
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=development-secret-change-in-production
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - SUPPORT_USERNAME=support
      - SUPPORT_PASSWORD=support123
      - LOG_LEVEL=debug
    depends_on:
      redis:
        condition: service_healthy
    # No volumes - using production build from Dockerfile

volumes:
  redis-data:
